version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: whatsapp-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_saas
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Initialize tables automatically on first run
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Backend API
  backend:
    build: ./Backend
    container_name: whatsapp-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://admin:password@db:5432/whatsapp_saas
      JWT_SECRET: docker-secret-key
    volumes:
      # Persist WhatsApp session data
      - ./auth_info_baileys:/app/auth_info_baileys
      # For easier development (live reload), mount source - optional
      # - ./Backend/src:/app/src
    depends_on:
      - db
    restart: always

  # 3. Frontend Dashboard
  frontend:
    build: ./frontend
    container_name: whatsapp-frontend
    ports:
      - "3000:3000"
    environment:
      # In Docker network, backend is at 'http://backend:3001'
      # But for client-side fetching (browser), we still use localhost or public IP
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
