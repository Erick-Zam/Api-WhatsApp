services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: whatsapp-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_saas
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Initialize tables automatically on first run
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Backend API
  backend:
    build: ./Backend
    container_name: whatsapp-backend
    expose:
      - "3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://admin:password@db:5432/whatsapp_saas
      JWT_SECRET: docker-secret-key
    volumes:
      # Persist WhatsApp session data
      - whatsapp_sessions:/app/auth_info_baileys
    depends_on:
      - db
    restart: always

  # 3. Frontend Dashboard
  frontend:
    build: ./frontend
    container_name: whatsapp-frontend
    expose:
      - "3000"
    environment:
      # URL base del proxy
      NEXT_PUBLIC_API_URL: /api
      # URL interna del backend dentro de la red docker para el rewrite de Next.js
      BACKEND_INTERNAL_URL: http://backend:3001
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
  whatsapp_sessions:
